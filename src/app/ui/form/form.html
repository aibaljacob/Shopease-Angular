<section class="contact-section">

    <div class="contact-header">

        <span class="section-tag">Contact Us</span>

        <h2>We're Here to Help</h2>

        <p>
            Have questions about your order or need assistance? Send us a
            message <Br> and our support team will get back to you as soon as possible.
        </p>

    </div>

  

        

        <!-- Contact Form -->

        <div class="contact-form-card">

            <h3>Send Us a Message</h3>

            <form>

                <div class="form-group">

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Your Name">

                </div>

                <div class="form-group">

                    <input
                        type="email"
                        class="form-control"
                        placeholder="Your Email">

                </div>

                <div class="form-group">

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Subject">

                </div>

                <div class="form-group">

                    <textarea
                        rows="6"
                        class="form-control"
                        placeholder="Your Message"></textarea>

                </div>

                <button class="send-btn">

                    <i class="bi bi-send-fill"></i>

                    Send Message

                </button>

            </form>

        </div>

 

</section>
